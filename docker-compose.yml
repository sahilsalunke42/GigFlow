version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: gigflow-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-gigflow}
    volumes:
      - mongodb_data:/data/db
    networks:
      - gigflow-network

  server:
    build: ./server
    container_name: gigflow-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/${MONGO_DB_NAME:-gigflow}?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
    depends_on:
      - mongodb
    networks:
      - gigflow-network
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    container_name: gigflow-client
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
    depends_on:
      - server
    networks:
      - gigflow-network
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  gigflow-network:
    driver: bridge
